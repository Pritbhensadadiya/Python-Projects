<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: #ffffff;
        padding: 40px;
        width: 420px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        font-size: 2.2rem;
        margin-bottom: 25px;
        color: #333;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .url_input {
        padding: 15px;
        border-radius: 10px;
        border: 2px solid #ddd;
        font-size: 1rem;
        transition: 0.3s;
      }

      .url_input:focus {
        border-color: #667eea;
        outline: none;
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
      }

      .url-submit {
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
      }

      .url-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .message {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        text-align: left;
      }

      .success {
        background-color: #e6ffed;
        border-left: 5px solid #28a745;
        color: #155724;
      }

      .error {
        background-color: #ffe6e6;
        border-left: 5px solid #dc3545;
        color: #721c24;
      }

      .message span {
        word-break: break-all;
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🔗 URL Shortener</h1>

      <form method="POST">
        {{ form.hidden_tag() }}
        {{ form.url(class_="url_input") }}
        {{ form.submit(class_="url-submit") }}
      </form>

      {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="message {{category}}">
              <span>{{message}}</span>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>
  </body>
</html>
